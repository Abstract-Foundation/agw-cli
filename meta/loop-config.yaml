version: 1
autonomy:
  branch_mode: direct_to_main
  stop_mode: never_stop
  lock_file: .agent-loop.lock
codex:
  command: codex
  model: gpt-5.3-codex
  run_template: 'codex exec --model "{model}" --sandbox danger-full-access --cd "{repoRoot}" {prompt}'
loop:
  max_iterations_per_run: 9600
  sleep_seconds_between_iterations: 3
  idle_sleep_seconds_when_empty: 20
  max_lock_wait_seconds: 120
  codex_retries_per_task: 3
  codex_retry_backoff_seconds: 10
  quality_retries_per_task: 2
  quality_retry_backoff_seconds: 5
  retry_failed_tasks: true
quality_gates:
  command: npm run check-types && npm test && npm run lint && npm run build
git:
  commit_after_task: true
  push_after_commit: true
  require_private_remote: true
  commit_message_template: "task({task_id}): {objective}"
memory:
  product_file: meta/product.md
  prd_file: meta/prd.md
  decisions_file: meta/decisions.md
  tasks_file: meta/tasks.md
  progress_file: meta/progress.md
  risks_file: meta/risks.md
  test_strategy_file: meta/test-strategy.md
  slo_file: meta/slo.md
  user_flows_file: meta/user-flows.md
  state_file: meta/state.json
slo_targets:
  loop_health_pass_rate: 0.85
  autonomous_task_completion_rate: 0.60
  reopen_rate_72h: 0.05
  secret_leak_count: 0
  write_tool_test_coverage_required: 1.00
  read_tool_p95_seconds: 2.0
  preflight_p95_seconds: 4.0
